<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rejected</title>
    <!-- tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- icon -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="bg-gray-100">
    <header class="w-[80%] mx-auto space-y-5">
      <h2 class="text-3xl font-bold text-blue-950">Job Application Tracker</h2>
      <div class="grid sm:grid-cols-1 lg:grid-cols-3 gap-3">
        <div class="bg-gray-50 pl-5 py-5 rounded-xl">
          <p>Total</p>
          <p id="total" class="text-blue-950">8</p>
        </div>
        <div class="bg-gray-50 pl-5 py-5 rounded-xl">
          <p>Interview</p>
          <p id="interview" class="text-green-300">0</p>
        </div>
        <div class="bg-gray-50 pl-5 py-5 rounded-xl">
          <p>Rejected</p>
          <p id="rejected" class="text-red-200">0</p>
        </div>
      </div>
    </header>
    <hr class="my-5 w-[80%] mx-auto border-gray-300" />
    <main class="w-[80%] mx-auto space-y-5">
      <div class="mb-4">
        <div class="flex justify-between">
          <h2 class="text-blue-950 text-2xl mb-4">Avaiable Jobs</h2>
          <p class="text-gray-500">0 jobs</p>
        </div>
        <div class="flex flex-col md:flex-row lg:block gap-3">
          <button
            onclick="toggleStyle('all-filter-btn')"
            id="all-filter-btn"
            class="text-gray-400 bg-gray-50 rounded px-8 py-2"
          >
            All
          </button>
          <button
            onclick="toggleStyle('interview-filter-btn')"
            id="interview-filter-btn"
            class="text-gray-400 bg-gray-50 rounded px-8 py-2"
          >
            Interview
          </button>
          <button
            onclick="toggleStyle('rejected-filter-btn')"
            id="rejected-filter-btn"
            class="text-gray-500 bg-gray-50 rounded px-8 py-2"
          >
            Rejected
          </button>
        </div>
      </div>
      <section id="allCard" class="space-y-5">
        <div class="bg-gray-50 rounded p-30">
          <div class="flex justify-center items-center">
            <img src="../B13-A-04/jobs.png" />
          </div>
          <div class="text-center">
            <p class="text-xl text-blue-950">No Jobs Avaiable</p>
            <p class="text-gray-500">
              Check back soon for new job opportunities
            </p>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
