<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Application Tracker</title>
    <!-- tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- icon -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="bg-gray-100">
    <header class="w-[80%] mx-auto space-y-5">
      <h2 class="text-3xl font-bold text-blue-950">Job Application Tracker</h2>
      <div class="grid sm:grid-cols-1 lg:grid-cols-3 gap-3">
        <div class="bg-gray-50 pl-5 py-5 rounded-xl">
          <p>Total</p>
          <p class="text-blue-950">0</p>
        </div>
        <div class="bg-gray-50 pl-5 py-5 rounded-xl">
          <p>Interview</p>
          <p class="text-green-300">0</p>
        </div>
        <div class="bg-gray-50 pl-5 py-5 rounded-xl">
          <p>Rejected</p>
          <p class="text-red-200">0</p>
        </div>
      </div>
    </header>
    <hr class="my-5 w-[80%] mx-auto border-gray-300" />
    <main class="w-[80%] mx-auto space-y-5">
      <div class="mb-4">
        <div class="flex justify-between">
          <h2 class="text-blue-950 text-2xl mb-4">Avaiable Jobs</h2>
          <p class="text-gray-500">8 jobs</p>
        </div>
        <button
          id="all-filter-btn"
          class="text-white bg-blue-500 rounded px-8 py-2"
        >
          All
        </button>
        <button
          id="interview-filter-btn"
          class="text-gray-400 bg-gray-50 rounded px-8 py-2"
        >
          Interview
        </button>
        <button
          id="interview-filter-btn"
          class="text-gray-500 bg-gray-50 rounded px-8 py-2"
        >
          Rejected
        </button>
      </div>
      <!-- card -->
      <div class="card flex justify-between bg-gray-50 rounded p-4">
        <!-- 1 -->
        <div class="space-y-6">
          <div>
            <h3 class="text-blue-950">Mobile Frist Crop</h3>
            <p class="text-gray-400">React Native Developer</p>
          </div>
          <div class="flex gap-3">
            <p class="text-gray-400">Remote .</p>
            <p class="text-gray-400">Full Time .</p>
            <p class="text-gray-400">$130,000-$175,000</p>
          </div>

          <p class="px-3 py-3 bg-blue-100 inline-block">NOT APPLIED</p>
          <p class="text-gray-500">
            Bulid cross-platfrom mobile application using React Native.Work on
            products used by millions of user worldwide.
          </p>
          <div>
            <button
              class="text-green-300 border border-green-200 rounded px-4 py-2"
            >
              Interview
            </button>
            <button
              class="text-red-300 border border-red-100 rounded px-4 py-2"
            >
              Rejected
            </button>
          </div>
        </div>
        <!-- 2 -->
        <div
          class="inline-flex rounded-full border border-gray-300 w-fit h-fit p-2"
        >
          <i class="fa-regular fa-trash-can"></i>
        </div>
      </div>
    </main>
  </body>
</html>
